
<body>
<app-header></app-header>
<title>Gestión de Ligas</title>

<div class="container mt-5 mb-5" style="min-height: 65vh;">


  <div *ngIf="cargando" class="d-flex flex-column align-items-center justify-content-center h-100" style="min-height: 65vh;">
    <div class="spinner-border text-danger" style="width: 4rem; height: 4rem;" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <h4 class="mt-3 loading fw-bold">Cargando ligas...</h4>
  </div>


  <div *ngIf="!cargando" class="animate__animated animate__fadeIn">

    <h2 class="main-title text-center mb-4">Gestión de Ligas</h2>

    <div class="d-flex justify-content-end mb-3">
      <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalCrearLiga">
        <i class="fas fa-plus"></i> Añadir Liga
      </button>
    </div>

    <div class="card shadow p-4">
      <div class="table-responsive">
        <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="table table-striped table-bordered row-border hover">
          <thead class="table-dark">
          <tr>
            <th>Nombre</th>
            <th class="text-center">Nº Equipos</th>
            <th class="text-center">Jornada</th>
            <th class="text-center" style="width: 150px;">Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let l of ligas">
            <td class="fw-bold">{{ l.nombre }}</td>
            <td class="text-center">
              <span class="badge bg-secondary">{{ l.n_equipos || 0 }}</span>
            </td>
            <td class="text-center">{{ (l.jornada || 0) > 38 ? 38 : (l.jornada || 0) }}</td>
            <td class="text-center">
              <button class="btn btn-danger btn-md"
                      title="Eliminar"
                      (click)="eliminarLiga(l.id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- =================  CREAR LIGA ================= -->
<div class="modal fade" id="modalCrearLiga" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Nueva Liga</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <form (ngSubmit)="guardarLiga()">
          <div class="mb-3">
            <label class="form-label">Nombre de la Liga</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaLiga.nombre" name="nombre" required placeholder="Ej: Liga de Campeones">
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success-inside" (click)="guardarLiga()">Crear</button>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>

</body>
