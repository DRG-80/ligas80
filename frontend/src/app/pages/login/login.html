<app-header></app-header>


<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Inicio de Sesión</title>
</head>
<body>

<div class="d-flex justify-content-center align-items-center main-container" style="min-height: 80vh;">
  <div class="login-card text-center" style="max-width: 400px; width: 100%;">
    <img src="Ligas80-logo.png" class="login-logo mb-3" style="width: 120px;">
    <h2 class="mb-4 login-title">Iniciar Sesión</h2>
    <form (ngSubmit)="submit()">
      <div class="mb-3 text-start">
        <label>Correo</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
      </div>
      <div class="mb-3 text-start">
        <label>Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" required>
      </div>
      <div *ngIf="error" class="text-danger mb-3">{{ error }}</div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-white flex-fill">Iniciar Sesión</button>
        <a routerLink="/register" class="btn btn-outline-red flex-fill">Regístrate</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>


<app-footer></app-footer>
