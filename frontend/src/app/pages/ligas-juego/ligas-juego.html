<title>Panel de Juego</title>

<body>
<app-header></app-header>

<div class="container mt-5 mb-5" style="min-height: 60vh;">


  <div *ngIf="cargando" class="d-flex flex-column align-items-center justify-content-center h-100" style="min-height: 60vh;">
    <div class="spinner-border text-danger" style="width: 4rem; height: 4rem;" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <h4 class="loading mt-3  fw-bold">Cargando el menú de juego...</h4>
  </div>


  <div *ngIf="!cargando" class="animate__animated animate__fadeIn">


    <div *ngIf="pertenencia && !elegido">
      <div class="text-center mb-4">
        <h2 class="fw-bold">Elige tu Equipo</h2>
        <p class="text-muted">Selecciona con qué equipo quieres competir en esta liga.</p>
      </div>

      <div class="card shadow p-4 border-0">
        <div class="table-responsive">
          <table datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="table table-striped table-hover w-100 tabla-mis-equipos">
            <thead class="thead-corporativo">
            <tr>
              <th>Nombre del Equipo</th>
              <th class="text-center" style="width: 150px;">Acción</th>
            </tr>
            </thead>
            <tbody>
            <tr *ngFor="let e of equiposDisponibles">
              <td class="fw-bold">{{ e.nombre_equipo }}</td>
              <td class="text-center">
                <button class="btn btn-nuevoEquipo fw-bold px-3 py-1" (click)="elegirEquipo(e.id_equipo)">
                  Elegir
                </button>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>


    <div *ngIf="pertenencia && elegido" class="dashboard-juego">
      <div class="text-center mb-5 mt-3">
        <h6 class="text-uppercase text-muted ls-2">Entrenando a</h6>
        <h1 class="display-3 fw-bold text-uppercase equipo-titulo">
          {{ miEquipo?.nombre_equipo || 'MI EQUIPO' }}
        </h1>
        <div class="divider-rojo mx-auto"></div>
      </div>

      <div class="row justify-content-center g-4">

        <div class="col-md-6 col-lg-3">
          <button class="btn-menu-juego w-100 shadow-sm" [routerLink]="['/fichajes', idLiga, miEquipo.id_equipo]">
            <div class="icon-box mb-3">
              <i class="bi bi-cash-coin"></i>
            </div>
            <span class="titulo">Fichar</span>
            <span class="subtitulo">Mercado de Jugadores</span>
          </button>
        </div>


        <div class="col-md-6 col-lg-3">
          <button class="btn-menu-juego w-100 shadow-sm" [routerLink]="['/plantilla', idLiga, miEquipo.id_equipo]">
            <div class="icon-box mb-3">
              <i class="bi bi-people-fill"></i>
            </div>
            <span class="titulo">Plantilla</span>
            <span class="subtitulo">Gestionar Jugadores</span>
          </button>
        </div>


        <div class="col-md-6 col-lg-3">
          <button class="btn-menu-juego btn-jugar w-100 shadow-sm" [routerLink]="['/jugar', idLiga, miEquipo.id_equipo]">
            <div class="icon-box mb-3">
              <i class="bi bi-play-circle-fill"></i>
            </div>
            <span class="titulo">Jugar</span>
            <span class="subtitulo">Ir a la Jornada</span>
          </button>
        </div>


        <div class="col-md-6 col-lg-3">
          <button class="btn-menu-juego w-100 shadow-sm" [routerLink]="['/clasificacion', idLiga]">
            <div class="icon-box mb-3">
              <i class="bi bi-trophy-fill"></i>
            </div>
            <span class="titulo">Clasificación</span>
            <span class="subtitulo">Ver Tabla</span>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<app-footer></app-footer>

</body>
